<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad256" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6fd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a2d6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad256" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow256" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.35)" />
    </filter>
  </defs>
  <!-- Background rounded rect -->
  <rect width="256" height="256" rx="44" ry="44" fill="url(#bgGrad256)" />
  <!-- Subtle inner highlight shine -->
  <rect width="256" height="128" rx="44" ry="44" fill="url(#shineGrad256)" />
  <!-- Letter R -->
  <text
    x="128"
    y="188"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="180"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    filter="url(#shadow256)"
    letter-spacing="-4"
  >R</text>
</svg>
